<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ .Site.Params.name }} — {{ index .Site.Params.quotes 0 }}" />
  <title>{{ .Site.Params.name }}</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <canvas id="space"></canvas>
  <main>
    <div class="card">
      <h1 class="name">{{ .Site.Params.name }}</h1>
      <p class="quote" id="quote" aria-live="polite">{{ index .Site.Params.quotes 0 }}</p>
    </div>
  </main>

  <script>
    // Stars animation
    (function() {
      var canvas = document.getElementById('space');
      var ctx = canvas.getContext('2d');
      var stars = [];
      var numStars = 500;
      var fps = 60;
      var screenW, screenH;

      function resize() {
        screenW = canvas.width = window.innerWidth;
        screenH = canvas.height = window.innerHeight;
      }

      function Star(x, y, length, opacity) {
        this.x = x;
        this.y = y;
        this.length = length;
        this.opacity = opacity;
        this.factor = 1;
        this.increment = Math.random() * 0.03;
      }

      Star.prototype.draw = function() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(Math.PI / 10);

        if (this.opacity > 1) {
          this.factor = -1;
        } else if (this.opacity <= 0) {
          this.factor = 1;
          this.x = Math.round(Math.random() * screenW);
          this.y = Math.round(Math.random() * screenH);
        }
        this.opacity += this.increment * this.factor;

        ctx.beginPath();
        for (var i = 5; i--;) {
          ctx.lineTo(0, this.length);
          ctx.translate(0, this.length);
          ctx.rotate(Math.PI * 2 / 10);
          ctx.lineTo(0, -this.length);
          ctx.translate(0, -this.length);
          ctx.rotate(-(Math.PI * 6 / 10));
        }
        ctx.lineTo(0, this.length);
        ctx.closePath();

        ctx.fillStyle = 'rgba(255,255,200,' + this.opacity + ')';
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#ffffaa';
        ctx.fill();
        ctx.restore();
      };

      function initStars() {
        stars = [];
        for (var i = 0; i < numStars; i++) {
          stars.push(new Star(
            Math.round(Math.random() * screenW),
            Math.round(Math.random() * screenH),
            1 + Math.random() * 1.5,
            Math.random()
          ));
        }
      }

      function animate() {
        ctx.clearRect(0, 0, screenW, screenH);
        stars.forEach(function(s) { s.draw(); });
      }

      resize();
      initStars();
      setInterval(animate, 1000 / fps);
      window.addEventListener('resize', function() { resize(); initStars(); });
    })();

    // Quote rotation
    const quotes = [
      {{ range .Site.Params.quotes }}"{{ . }}",{{ end }}
    ];
    let current = 0;
    const el = document.getElementById("quote");

    function nextQuote() {
      el.classList.add("fade-out");
      setTimeout(() => {
        current = (current + 1) % quotes.length;
        el.textContent = quotes[current];
        el.classList.remove("fade-out");
      }, 400);
    }

    setInterval(nextQuote, 5000);
  </script>
</body>
</html>
