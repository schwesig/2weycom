<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ .Site.Params.name }} — {{ index .Site.Params.quotes 0 }}" />
  <title>{{ .Site.Params.name }}</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <canvas id="space"></canvas>
  <main>
    <div class="card">
      <h1 class="name">{{ .Site.Params.name }}</h1>
      <div class="quote-wrap" id="quote-wrap" aria-live="polite"></div>
    </div>
  </main>

  <script>
    // Stars animation
    (function() {
      var canvas = document.getElementById('space');
      var ctx = canvas.getContext('2d');
      var stars = [];
      var numStars = 500;
      var fps = 60;
      var screenW, screenH;

      function resize() {
        screenW = canvas.width = window.innerWidth;
        screenH = canvas.height = window.innerHeight;
      }

      function Star(x, y, length, opacity) {
        this.x = x; this.y = y; this.length = length;
        this.opacity = opacity; this.factor = 1;
        this.increment = Math.random() * 0.03;
      }

      Star.prototype.draw = function() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(Math.PI / 10);
        if (this.opacity > 1) { this.factor = -1; }
        else if (this.opacity <= 0) {
          this.factor = 1;
          this.x = Math.round(Math.random() * screenW);
          this.y = Math.round(Math.random() * screenH);
        }
        this.opacity += this.increment * this.factor;
        ctx.beginPath();
        for (var i = 5; i--;) {
          ctx.lineTo(0, this.length); ctx.translate(0, this.length);
          ctx.rotate(Math.PI * 2 / 10);
          ctx.lineTo(0, -this.length); ctx.translate(0, -this.length);
          ctx.rotate(-(Math.PI * 6 / 10));
        }
        ctx.lineTo(0, this.length);
        ctx.closePath();
        ctx.fillStyle = 'rgba(255,255,200,' + this.opacity + ')';
        ctx.shadowBlur = 12; ctx.shadowColor = '#ffffaa';
        ctx.fill(); ctx.restore();
      };

      function initStars() {
        stars = [];
        for (var i = 0; i < numStars; i++) {
          stars.push(new Star(
            Math.round(Math.random() * screenW),
            Math.round(Math.random() * screenH),
            1 + Math.random() * 1.5, Math.random()
          ));
        }
      }

      function animate() {
        ctx.clearRect(0, 0, screenW, screenH);
        stars.forEach(function(s) { s.draw(); });
      }

      resize(); initStars();
      setInterval(animate, 1000 / fps);
      window.addEventListener('resize', function() { resize(); initStars(); });
    })();

    // Quote rotation with directional slide-in
    const quotes = [
      {{ range .Site.Params.quotes }}"{{ . }}",{{ end }}
    ];
    let current = 0;
    const wrap = document.getElementById('quote-wrap');

    function splitQuote(q) {
      // Split at '. ' if present
      const dotIdx = q.indexOf('. ');
      if (dotIdx !== -1) return [q.slice(0, dotIdx + 1), q.slice(dotIdx + 1).trim()];
      // Otherwise split at word boundary closest to middle
      const mid = Math.floor(q.length / 2);
      let splitAt = mid;
      for (let i = 0; i <= mid; i++) {
        if (q[mid + i] === ' ') { splitAt = mid + i; break; }
        if (q[mid - i] === ' ') { splitAt = mid - i; break; }
      }
      return [q.slice(0, splitAt).trim(), q.slice(splitAt).trim()];
    }

    function showQuote(q) {
      wrap.replaceChildren();
      const parts = splitQuote(q);
      const dirs = ['from-left', 'from-right'];
      parts.forEach(function(part, i) {
        const span = document.createElement('span');
        span.className = 'quote-line ' + dirs[i % 2];
        span.textContent = part;
        wrap.appendChild(span);
        requestAnimationFrame(function() {
          requestAnimationFrame(function() { span.classList.add('visible'); });
        });
      });
    }

    function nextQuote() {
      Array.from(wrap.querySelectorAll('.quote-line')).forEach(function(el, i) {
        el.classList.remove('visible');
        el.classList.add(i % 2 === 0 ? 'exit-left' : 'exit-right');
      });
      setTimeout(function() {
        current = (current + 1) % quotes.length;
        showQuote(quotes[current]);
      }, 500);
    }

    showQuote(quotes[current]);
    setInterval(nextQuote, 5000);
  </script>
</body>
</html>
